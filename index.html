<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

<h2>Messagerie</h2>

<div id="messages" style="border:1px solid black; height:200px; overflow:auto;"></div>

<br>

<input type="text" id="auteur" placeholder="Votre nom">
<br><br>
<input type="text" id="message" placeholder="Votre message">
<button id="envoyer">Envoyer</button>

<script>

let last_id = 0;

function chargerMessages() {

    $.get("recuperer.php", { last_id: last_id }, function(data) {

        if (data.trim() !== "") {
            $("#messages").append(data);

            let lastMessage = $("#messages p").last();
            last_id = lastMessage.data("id");

            $("#messages").scrollTop($("#messages")[0].scrollHeight);
        }
    });
}

chargerMessages();
setInterval(chargerMessages, 2000);

$("#envoyer").click(function() {

    let auteur = $("#auteur").val();
    let message = $("#message").val();

    if (auteur === "" || message === "") {
        alert("Remplis les champs");
        return;
    }

    $.post("enregistrer.php", {
        auteur: auteur,
        message: message
    });

    $("#message").val("");
});

$("#message").keyup(function(e) {
    if (e.keyCode == 13) {
        $("#envoyer").click();
    }
});

</script>

</body>
</html>
